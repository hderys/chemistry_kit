<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>⚙️ 金屬反應 · DSE</title>
    <base href="./">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            margin: 0;
            padding: 0;
        }
        html,
        body {
            height: 100%;
            overflow: hidden;
        }
        body {
            background: linear-gradient(145deg, #f0f4ff 0%, #d4dcec 100%);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 4px;
            padding-top: 4px;
        }

        .card {
            max-width: 1200px;
            width: 100%;
            height: 98vh;
            max-height: 98vh;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(40, 60, 120, 0.15);
            padding: 0.5rem 1rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(180, 200, 220, 0.3);
        }

        .header {
            display: flex;
            flex-direction: column;
            gap: 3px;
            flex-shrink: 0;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 3px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
        }
        .header-left select {
            font-size: 1.1rem;
            font-weight: 700;
            color: #2a3a6a;
            background: transparent;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 2px 0;
            max-width: 200px;
        }
        .header-left select option {
            font-weight: 600;
        }
        .header-funcs {
            display: flex;
            gap: 3px;
            flex-wrap: wrap;
        }
        .header-funcs .func-btn {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            background: #f0f4fc;
            color: #4a5a7a;
            border: 2px solid #d0d8e8;
            min-height: 32px;
        }
        .header-funcs .func-btn:hover {
            background: #e0e8f8;
            border-color: #4a6a9a;
        }
        .header-funcs .func-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 3px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .lang-toggle {
            display: flex;
            gap: 2px;
            background: white;
            padding: 2px;
            border-radius: 30px;
            flex-shrink: 0;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
        }
        .lang-btn {
            padding: 4px 12px;
            border: none;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.15s;
            background: transparent;
            color: #5a6a8a;
        }
        .lang-btn.active {
            background: #4a6a9a;
            color: white;
            box-shadow: 0 2px 8px rgba(74, 106, 154, 0.3);
        }
        .lang-btn:hover:not(.active) {
            background: #e8eef8;
        }

        .question-area {
            flex: 1;
            min-width: 0;
            padding: 0.1rem 0.3rem;
            overflow: hidden;
            border-radius: 14px;
            background: white;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .question-area .tab-content {
            display: none;
            flex-direction: column;
            height: 100%;
            min-height: 0;
        }
        .question-area .tab-content.active {
            display: flex;
        }

        .split-panel {
            display: flex;
            gap: 4px;
            flex: 1;
            min-height: 0;
            align-items: flex-start;
        }
        .split-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
            min-width: 0;
            min-height: 0;
            height: 100%;
        }

        .hint-row-wrap {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 4px 8px;
            flex-shrink: 0;
            padding: 2px 0;
        }
        .hint-row-wrap .hint-text {
            font-size: 1rem;
            color: #6a7a8a;
            flex: 1;
            min-width: 150px;
        }
        .hint-row-wrap .hint-text .highlight {
            color: #e74c3c;
            font-weight: 700;
        }
        .hint-row-wrap .balance-toggle-compact {
            display: flex;
            align-items: center;
            gap: 3px;
            background: #e8f0fe;
            padding: 1px 8px 1px 5px;
            border-radius: 30px;
            border: 2px solid #4a6a9a;
            font-size: 0.8rem;
            font-weight: 700;
            color: #2a3a6a;
            cursor: pointer;
            user-select: none;
            flex-shrink: 0;
            white-space: nowrap;
        }
        .hint-row-wrap .balance-toggle-compact input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #4a6a9a;
            margin: 0;
        }

        .top-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 4px 10px;
            padding: 4px 0;
            flex-shrink: 0;
        }
        .top-row .spin-box {
            background: #f0f4fc;
            border-radius: 10px;
            padding: 3px 12px;
            border: 2px solid #c8d4e8;
            text-align: center;
            min-width: 55px;
        }
        .top-row .spin-box .label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #5a6a8a;
        }
        .top-row .spin-box .value {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2a3a6a;
            min-height: 1.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 2px;
        }
        .top-row .btn-spin {
            background: linear-gradient(145deg, #6a8aba, #4a6a9a);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 6px 22px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 20px rgba(74, 106, 154, 0.3);
            min-height: 40px;
            white-space: nowrap;
            min-width: 80px;
        }
        .top-row .btn-spin:hover:not(:disabled) {
            transform: scale(1.03);
        }
        .top-row .btn-spin:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }
        .top-row .btn-spin.spinning {
            animation: pulse 0.5s ease-in-out infinite alternate;
        }
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.03);
                opacity: 0.8;
            }
        }
        .top-row .arrow-display {
            font-size: 1.2rem;
            font-weight: 700;
            color: #6a8aba;
            min-width: 32px;
            display: inline-block;
            text-align: center;
        }
        .top-row .operator-plus {
            font-size: 1.2rem;
            font-weight: 700;
            color: #6a8aba;
        }

        .question-block {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
        }

        .reaction-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px 10px;
            transition: all 0.2s;
        }
        .reaction-row.hidden {
            display: none !important;
        }

        .q-label {
            font-size: 1.1rem;
            font-weight: 700;
            color: #4a5a7a;
            min-width: 60px;
        }
        .q-options {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .q-options .opt-btn {
            border: 2px solid #d0d8e8;
            background: white;
            padding: 4px 18px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            color: #2a3a6a;
            min-height: 36px;
            white-space: nowrap;
        }
        .q-options .opt-btn:hover:not(:disabled) {
            background: #eef4fc;
        }
        .q-options .opt-btn.selected {
            border-color: #4a6a9a;
            background: #4a6a9a;
            color: white;
        }
        .q-options .opt-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-check {
            background: linear-gradient(145deg, #f5a623, #e0941a);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 4px 20px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 20px rgba(245, 166, 35, 0.3);
            min-height: 36px;
            white-space: nowrap;
        }
        .btn-check:hover:not(:disabled) {
            transform: scale(1.03);
        }
        .btn-check:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        .product-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 0;
            align-items: center;
        }
        .product-group .prod-btn {
            border: 2px solid #d0d8e8;
            background: white;
            padding: 4px 16px;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            color: #3a4a6a;
            min-height: 34px;
            white-space: nowrap;
            flex: 1 0 auto;
            max-width: 140px;
            text-align: center;
        }
        .product-group .prod-btn:hover:not(:disabled) {
            background: #eef4fc;
        }
        .product-group .prod-btn.selected {
            border-color: #4a6a9a;
            background: #4a6a9a;
            color: white;
        }
        .product-group .prod-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .product-group .prod-btn.correct {
            border-color: #2ecc71;
            background: #d4edda;
            color: #155724;
            font-weight: 700;
        }
        .product-group .prod-btn.incorrect {
            border-color: #e74c3c;
            background: #f8d7da;
            color: #721c24;
            font-weight: 700;
        }

        .product-group .btn-next-step {
            background: linear-gradient(145deg, #f5a623, #e0941a);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 4px 18px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            min-height: 34px;
            white-space: nowrap;
            box-shadow: 0 2px 10px rgba(245, 166, 35, 0.3);
        }
        .product-group .btn-next-step:hover:not(:disabled) {
            transform: scale(1.03);
        }
        .product-group .btn-next-step:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        .product-feedback {
            font-size: 1.1rem;
            font-weight: 600;
            margin-left: 6px;
            display: inline-block;
        }
        .product-feedback.success {
            color: #155724;
        }
        .product-feedback.error {
            color: #721c24;
        }

        .balance-area {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
            flex-shrink: 0;
            border-top: 2px dashed #d0d8e8;
            margin-top: 4px;
            flex-wrap: wrap;
        }
        .balance-area .bal-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #4a5a7a;
            white-space: nowrap;
        }
        .balance-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 6px 10px;
            padding: 4px 0;
            flex: 1;
        }
        .balance-row .term {
            font-size: 1.3rem;
            font-weight: 600;
            color: #2a3a6a;
        }
        .balance-row .arrow-symbol {
            font-size: 1.3rem;
            font-weight: 600;
            color: #6a8aba;
        }
        .balance-row .coeff-box {
            display: inline-block;
            border: 2px solid #c8d4e8;
            border-radius: 5px;
            background: white;
            min-width: 36px;
            height: 36px;
            line-height: 32px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: 700;
            color: #2a3a6a;
            cursor: pointer;
            padding: 0 6px;
            transition: 0.15s;
            user-select: none;
        }
        .balance-row .coeff-box:hover:not(:disabled) {
            background: #eef4fc;
            border-color: #4a6a9a;
        }
        .balance-row .coeff-box:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .balance-row .coeff-box.has-value {
            border-color: #4a6a9a;
            background: #e8f0fe;
        }

        .balance-trap-hint {
            font-size: 0.9rem;
            color: #e67e22;
            font-weight: 600;
            padding: 2px 10px;
            background: #fef9e7;
            border-radius: 8px;
            border: 1px solid #f39c12;
            width: 100%;
            text-align: center;
        }

        .coeff-popup {
            display: none;
            position: fixed;
            background: white;
            border-radius: 14px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
            padding: 12px;
            z-index: 1000;
            border: 2px solid #c8d4e8;
            min-width: 160px;
        }
        .coeff-popup.active {
            display: block;
        }
        .coeff-popup .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }
        .coeff-popup .grid button {
            border: 2px solid #d0d8e8;
            background: white;
            border-radius: 6px;
            padding: 6px 0;
            font-size: 1.1rem;
            font-weight: 700;
            color: #2a3a6a;
            cursor: pointer;
            transition: 0.15s;
        }
        .coeff-popup .grid button:hover {
            background: #eef4fc;
            border-color: #4a6a9a;
        }
        .coeff-popup .grid button.selected {
            background: #4a6a9a;
            color: white;
            border-color: #4a6a9a;
        }

        .obs-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 8px 0;
            border-top: 2px dashed #d0d8e8;
            margin-top: 4px;
            flex-shrink: 0;
        }
        .obs-section .obs-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #4a5a7a;
        }
        .obs-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px 10px;
        }
        .obs-row .obs-label {
            font-size: 1rem;
            font-weight: 600;
            color: #5a6a8a;
            min-width: 50px;
        }
        .obs-row select {
            border: 2px solid #d0d8e8;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 1rem;
            font-weight: 600;
            background: white;
            color: #2a3a6a;
            outline: none;
            min-height: 34px;
            min-width: 100px;
            flex: 0 1 auto;
        }
        .obs-row select:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .obs-row .obs-btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .obs-row .obs-btn {
            border: 2px solid #d0d8e8;
            background: white;
            padding: 4px 14px;
            border-radius: 18px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            color: #3a4a6a;
            min-height: 34px;
            white-space: nowrap;
        }
        .obs-row .obs-btn:hover:not(:disabled) {
            background: #eef4fc;
        }
        .obs-row .obs-btn.selected {
            border-color: #f5a623;
            background: #fff4e0;
        }
        .obs-row .obs-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .color-temp-wrapper {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            background: #f0f6ff;
            border: 2px solid #4a6a9a;
            border-radius: 8px;
            padding: 4px 10px;
        }
        .color-temp-wrapper select {
            min-width: 70px;
            border: 2px solid #c8d4e8;
            border-radius: 30px;
            padding: 2px 8px;
            font-size: 0.8rem;
            font-weight: 600;
            background: white;
            min-height: 28px;
        }
        .color-temp-wrapper .temp-arrow {
            font-size: 0.9rem;
            font-weight: 700;
            color: #4a6a9a;
        }
        .color-temp-wrapper .temp-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #4a6a9a;
        }

        .bottom-check-row {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 6px 0 0 0;
            margin-top: 4px;
            border-top: 2px dashed #d0d8e8;
            flex-wrap: wrap;
            gap: 10px;
        }

        .feedback-area {
            padding: 8px 18px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            background: #e8f5e8;
            border: 2px solid #6bcb77;
            color: #0d553a;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
            width: 100%;
            min-height: 44px;
            transition: 0.2s;
            flex-shrink: 0;
            margin-top: 6px;
        }
        .feedback-area.error {
            background: #fce8e8;
            border-color: #e74c3c;
            color: #7a2a2a;
        }
        .feedback-area .fb-row {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        .feedback-area .fb-icon {
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .feedback-area .fb-text {
            font-size: 1.1rem;
            font-weight: 700;
        }
        .feedback-area .fb-detail {
            font-size: 1rem;
            font-weight: 500;
            color: #5a5a7a;
            padding-left: 30px;
        }

        .btn-next-question {
            background: linear-gradient(145deg, #6a8aba, #4a6a9a);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 4px 18px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            min-height: 36px;
            white-space: nowrap;
            box-shadow: 0 2px 10px rgba(74, 106, 154, 0.3);
        }
        .btn-next-question:hover:not(:disabled) {
            transform: scale(1.03);
        }
        .btn-next-question:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: white;
            border-radius: 28px;
            max-width: 750px;
            width: 100%;
            max-height: 85vh;
            padding: 18px 22px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 4px;
        }
        .modal-header h2 {
            font-size: 0.95rem;
            color: #2a3a6a;
        }
        .modal-close {
            background: #f0e8f8;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            font-size: 0.9rem;
            cursor: pointer;
            color: #4a2a6a;
            font-weight: 700;
            transition: 0.15s;
        }
        .modal-close:hover {
            background: #e0d0f0;
        }
        .modal-body {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }
        .ref-table-wrap {
            overflow-y: auto;
            max-height: 55vh;
        }
        .ref-table-wrap::-webkit-scrollbar {
            width: 4px;
        }
        .ref-table-wrap::-webkit-scrollbar-thumb {
            background: #c0c8d8;
            border-radius: 10px;
        }
        .ref-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.6rem;
        }
        .ref-table thead {
            position: sticky;
            top: 0;
            z-index: 5;
        }
        .ref-table th {
            background: #4a6a9a;
            color: white;
            padding: 3px 5px;
            text-align: left;
            font-weight: 700;
            font-size: 0.5rem;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        .ref-table td {
            padding: 3px 5px;
            border-bottom: 1px solid #e8eef8;
            color: #2a3a6a;
            vertical-align: middle;
        }
        .ref-table .color-dot {
            display: inline-block;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 1px solid #c8d4e8;
            vertical-align: middle;
            margin-right: 3px;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }
        .ref-table .metal-symbol {
            font-weight: 700;
            color: #2a3a6a;
            font-size: 0.65rem;
            white-space: nowrap;
        }
        .ref-table .row-highlight {

            function renderBalanceEquation(metal, reagent) {
                const eq = getBalancedEquation(metal, reagent);
                const result = REACTION_MAP[metal]?.[reagent];

                if (result && result.trap) {
                    balanceArea.style.display = 'flex';
                    balanceRow.innerHTML = '';
                    balanceTrapHint.style.display = 'block';
                    balTitle.textContent = t('balTitle');
                    return;
                }

                balanceTrapHint.style.display = 'none';

                if (!eq || !balanceActive || !showBalanceAndObs) {
                    balanceArea.style.display = 'none';
                    return;
                }
                balanceArea.style.display = 'flex';
                balanceTerms = eq.terms;
                balanceCoeffs = {};
                balanceTerms.forEach((_, idx) => { balanceCoeffs[idx] = 1; });
                let html = '';
                balanceTerms.forEach((term, idx) => {
                    const coeff = balanceCoeffs[idx] || 1;
                    const displayCoeff = coeff === 1 ? '' : coeff;
                    html += `<span class="term">`;
                    html += `<span class="coeff-box" data-idx="${idx}" data-value="${coeff}">${displayCoeff || '&nbsp;'}</span>`;
                    html += `${term}</span>`;
                    if (idx < balanceTerms.length - 1) {
                        html += `<span class="arrow-symbol"> → </span>`;
                    }
                });
                balanceRow.innerHTML = html;
                document.querySelectorAll('.coeff-box').forEach(box => {
                    box.addEventListener('click', function(e) {
                        if (isAnswered || isSpinning) return;
                        const idx = parseInt(this.dataset.idx);
                        currentCoeffTarget = idx;
                        const rect = this.getBoundingClientRect();
                        const popup = document.getElementById('coeffPopup');
                        let left = rect.left + rect.width / 2 - 90;
                        let top = rect.bottom + 8;
                        if (left < 10) left = 10;
                        if (top + 150 > window.innerHeight) top = rect.top - 150;
                        popup.style.left = left + 'px';
                        popup.style.top = top + 'px';
                        const currentVal = parseInt(this.dataset.value) || 1;
                        document.querySelectorAll('#coeffGrid button').forEach(b => {
                            b.classList.toggle('selected', parseInt(b.dataset.val) === currentVal);
                        });
                        popup.classList.add('active');
                        popupVisible = true;
                    });
                });
                balTitle.textContent = t('balTitle');
            }

            function setupCoeffPopup() {
                document.querySelectorAll('#coeffGrid button').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const val = parseInt(this.dataset.val);
                        if (currentCoeffTarget !== null) {
                            balanceCoeffs[currentCoeffTarget] = val;
                            const box = document.querySelector(
                                `.coeff-box[data-idx="${currentCoeffTarget}"]`);
                            if (box) {
                                box.dataset.value = val;
                                box.innerHTML = val === 1 ? '&nbsp;' : val;
                                box.classList.add('has-value');
                            }
                        }
                        document.getElementById('coeffPopup').classList.remove('active');
                        popupVisible = false;
                        setFeedback('✏️', currentLang === 'zh' ? '已調整係數' : 'Coefficient adjusted', '',
                            null);
                    });
                });
                document.addEventListener('click', function(e) {
                    const popup = document.getElementById('coeffPopup');
                    if (popupVisible && !popup.contains(e.target) && !e.target.closest('.coeff-box')) {
                        popup.classList.remove('active');
                        popupVisible = false;
                    }
                });
            }

            function checkBalance(metal, reagent) {
                const eq = getBalancedEquation(metal, reagent);
                const result = REACTION_MAP[metal]?.[reagent];
                if (result && result.trap) return true;
                if (!eq || !balanceActive) return true;
                const correct = eq.coeffs;
                for (let i = 0; i < correct.length; i++) {
                    if ((balanceCoeffs[i] || 1) !== correct[i]) return false;
                }
                return true;
            }

            // ============================================================
            // 轉盤抽題
            // ============================================================
            function spinWheel() {
                if (isSpinning) return;

                isAnswered = false;
                selectedReaction = null;
                selectedPpt = new Set();
                selectedOther = new Set();
                selectedDeposit = new Set();
                selectedProducts = new Set();
                productsCorrect = false;
                showBalanceAndObs = false;
                productCheckDone = false;
                reactionChecked = false;
                balanceArea.style.display = 'none';
                productRow.style.display = 'none';
                obsSection.style.display = 'none';
                colorTempSub.style.display = 'none';
                productFeedback.textContent = '';
                productFeedback.className = 'product-feedback';
                document.querySelectorAll('.prod-btn').forEach(b => { b.classList.remove('correct', 'incorrect'); });

                if (reactionRow) {
                    reactionRow.classList.remove('hidden');
                }

                obsFlame.value = 'none';
                obsSolution.value = 'none';

                nextQuestionBtn.style.display = 'none';

                isSpinning = true;
                spinBtn.disabled = true;
                spinBtn.classList.add('spinning');
                spinBtn.textContent = currentLang === 'zh' ? '🌀 旋轉中...' : '🌀 Spinning...';

                document.querySelectorAll('.opt-btn').forEach(b => {
                    b.classList.remove('selected');
                    b.disabled = true;
                });
                document.querySelectorAll('#productGroup .prod-btn').forEach(b => {
                    b.classList.remove('selected');
                    b.disabled = true;
                });
                document.querySelectorAll('#obsPptGroup .obs-btn, #obsOtherGroup .obs-btn, #obsDepositGroup .obs-btn')
                    .forEach(b => {
                        b.classList.remove('selected');
                        b.disabled = true;
                    });
                checkReactionBtn.disabled = true;
                checkBottomBtn.disabled = true;
                nextStepBtn.disabled = true;
                nextQuestionBtn.disabled = true;
                nextQuestionBtn.style.display = 'none';

                let step = 0;
                const totalSteps = 8 + Math.floor(Math.random() * 6);

                function doStep() {
                    const randomMetal = METALS[Math.floor(Math.random() * METALS.length)];
                    const randomReagent = weightedReagents[Math.floor(Math.random() * weightedReagents.length)];
                    metalDisplay.textContent = randomMetal;
                    reagentDisplay.textContent = getReagentLabel(randomReagent);
                    step++;

                    if (step < totalSteps) {
                        const delay = 60 + step * 15;
                        setTimeout(doStep, delay);
                    } else {
                        completeSpin();
                    }
                }

                function completeSpin() {
                    let finalMetal, finalReagent;
                    let attempts = 0;
                    do {
                        finalMetal = METALS[Math.floor(Math.random() * METALS.length)];
                        finalReagent = weightedReagents[Math.floor(Math.random() * weightedReagents.length)];
                        attempts++;
                    } while (
                        (finalMetal === 'Hg' && finalReagent === 'AgNO3(aq)') ||
                        (finalMetal === 'Al' && finalReagent === 'H2O(g)')
                    );

                    currentMetal = finalMetal;
                    currentReagent = finalReagent;
                    metalDisplay.textContent = finalMetal;
                    reagentDisplay.textContent = getReagentLabel(finalReagent, finalMetal);
                    currentResult = REACTION_MAP[finalMetal]?.[finalReagent] || null;

                    const qMark = document.getElementById('reactionQuestionMark');
                    if (qMark) {
                        qMark.textContent = '→ ?';
                    }

                    document.querySelectorAll('.opt-btn').forEach(b => b.disabled = false);
                    spinBtn.disabled = false;
                    spinBtn.classList.remove('spinning');
                    spinBtn.textContent = t('spinBtn');
                    isSpinning = false;

                    spinBtn.style.transform = 'scale(1)';
                    spinBtn.style.opacity = '1';

                    setFeedback('✏️', t('fbSpin'), '', null);
                    obsRowFlame.style.display = 'flex';
                    obsRowSolid.style.display = 'none';
                    obsRowDeposit.style.display = 'none';
                    obsRowPpt.style.display = 'none';
                    obsRowOther.style.display = 'flex';
                    updateObsOptions();

                    nextQuestionBtn.disabled = true;
                    nextQuestionBtn.style.display = 'none';
                }

                const safetyTimer = setTimeout(function() {
                    if (isSpinning) {
                        const qMark = document.getElementById('reactionQuestionMark');
                        if (qMark) {
                            qMark.textContent = '→ ?';
                        }
                        document.querySelectorAll('.opt-btn').forEach(b => b.disabled = false);
                        spinBtn.disabled = false;
                        spinBtn.classList.remove('spinning');
                        spinBtn.textContent = t('spinBtn');
                        isSpinning = false;
                        spinBtn.style.transform = 'scale(1)';
                        spinBtn.style.opacity = '1';
                        setFeedback('✏️', t('fbSpin'), '', null);
                        obsRowFlame.style.display = 'flex';
                        obsRowSolid.style.display = 'none';
                        obsRowDeposit.style.display = 'none';
                        obsRowPpt.style.display = 'none';
                        obsRowOther.style.display = 'flex';
                        updateObsOptions();
                        nextQuestionBtn.disabled = true;
                        nextQuestionBtn.style.display = 'none';
                    }
                }, 4000);

                doStep();

                const originalComplete = completeSpin;
                completeSpin = function() {
                    clearTimeout(safetyTimer);
                    originalComplete();
                };
            }

            // ============================================================
            // 答題邏輯
            // ============================================================
            function setFeedback(icon, text, detail, type) {
                feedback0.className = 'feedback-area';
                if (type === 'error') feedback0.classList.add('error');
                else if (type === 'success') feedback0.classList.remove('error');
                const iconEl = feedback0.querySelector('.fb-icon');
                const textEl = feedback0.querySelector('.fb-text');
                const detailEl = feedback0.querySelector('.fb-detail');
                if (iconEl) iconEl.textContent = icon || '✏️';
                if (textEl) textEl.textContent = text || '';
                if (detailEl) detailEl.innerHTML = detail || '';
            }

                const btn = e.currentTarget;
                const value = btn.dataset.value;
                document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedReaction = value;
                reactionChecked = false;

                productRow.style.display = 'none';
                obsSection.style.display = 'none';
                balanceArea.style.display = 'none';
                productFeedback.textContent = '';
                productFeedback.className = 'product-feedback';

                document.querySelectorAll('#productGroup .prod-btn').forEach(b => b.disabled = true);
                document.querySelectorAll(
                    '#obsPptGroup .obs-btn, #obsOtherGroup .obs-btn, #obsDepositGroup .obs-btn').forEach(b => b
                    .disabled = true);

                checkReactionBtn.disabled = false;
                checkBottomBtn.disabled = true;
                nextStepBtn.disabled = true;
                spinBtn.disabled = true;
                nextQuestionBtn.disabled = true;
                nextQuestionBtn.style.display = 'none';

            function handleCheckReaction() {
                if (isAnswered || isSpinning) return;
                if (!selectedReaction) {
                    setFeedback('⚠️', currentLang === 'zh' ? '請先選擇「有反應」或「無反應」' :
                        'Please select reaction or no reaction', '', 'error');
                    return;
                }
                if (!currentMetal || !currentReagent) {
                    setFeedback('⚠️', currentLang === 'zh' ? '請先抽題' : 'Please spin first', '', 'error');
                    return;
                }
                const result = currentResult;
                if (!result) {
                    setFeedback('⚠️', currentLang === 'zh' ? '資料錯誤，請重新抽題' : 'Data error, please spin again', '',
                        'error');
                    return;
                }
                const correctReaction = result.reaction;
                const userReaction = selectedReaction === 'yes';

                if (userReaction !== correctReaction) {
                    let msg, detail;
                    if (correctReaction) {
                        msg = currentLang === 'zh' ? '❌ 這組合其實有反應！' : '❌ This combination actually reacts!';
                        detail = `${t('correctAnswer')} ${result.products}`;
                        if (result.trap) detail += ' ' + t('fbTrap');
                    } else {
                        msg = currentLang === 'zh' ? '❌ 這組合其實無反應！' : '❌ This combination actually does not react!';
                        detail = currentLang === 'zh' ? '💡 提示：此組合不會產生任何變化。' :
                            '💡 Hint: This combination produces no observable change.';
                    }
                    setFeedback('❌', msg, detail, 'error');
                    checkReactionBtn.disabled = true;
                    spinBtn.disabled = false;
                    spinBtn.textContent = t('spinBtn');
                    return;
                }

                reactionChecked = true;

                if (!correctReaction) {
                    isAnswered = true;
                    spinBtn.disabled = false;
                    spinBtn.textContent = t('nextBtn');
                    totalAttempts++;
                    correctAttempts++;
                    checkReactionBtn.disabled = true;
                    checkBottomBtn.disabled = true;
                    nextStepBtn.disabled = true;
                    setFeedback('✅', t('fbNoReaction'), '', 'success');

                    if (reactionRow) {
                        reactionRow.classList.add('hidden');
                    }
                    return;
                }

                productRow.style.display = 'flex';
                document.querySelectorAll('#productGroup .prod-btn').forEach(b => {
                    b.disabled = false;
                    b.classList.remove('correct', 'incorrect');
                });
                checkReactionBtn.disabled = true;
                nextStepBtn.disabled = false;
                setFeedback('✏️', currentLang === 'zh' ? '✅ 反應正確！請選擇產物（可複選），然後按「下一步」' :
                    '✅ Reaction correct! Select products (select all), then click "Next Step"', '', 'success');

                if (reactionRow) {
                    reactionRow.classList.add('hidden');
                }
            }

            function handleProductClick(e) {
                if (isAnswered || isSpinning) return;
                if (selectedReaction === 'no' || !reactionChecked) return;
                const btn = e.currentTarget;
                const key = btn.dataset.prod;
                if (selectedProducts.has(key)) {
                    selectedProducts.delete(key);
                    btn.classList.remove('selected');
                } else {
                    selectedProducts.add(key);
                    btn.classList.add('selected');
                }
                productFeedback.textContent = '';
                productFeedback.className = 'product-feedback';
                document.querySelectorAll('.prod-btn').forEach(b => { b.classList.remove('correct', 'incorrect'); });
            }

            function handleNextStep() {
                if (isAnswered || isSpinning) return;
                if (!reactionChecked || selectedReaction !== 'yes') {
                    setFeedback('⚠️', currentLang === 'zh' ? '請先確認反應狀態' : 'Please confirm reaction status first', '',
                        'error');
                    return;
                }
                const result = currentResult;
                if (!result) {
                    setFeedback('⚠️', currentLang === 'zh' ? '請先抽題' : 'Please spin first', '', 'error');
                    return;
                }
                const correctProds = result.prod || [];
                const userProds = Array.from(selectedProducts);
                if (userProds.length === 0) {
                    productFeedback.textContent = '⚠️ ' + (currentLang === 'zh' ? '請至少選擇一個產物' :
                        'Please select at least one product');
                    productFeedback.className = 'product-feedback error';
                    setFeedback('⚠️', currentLang === 'zh' ? '請選擇產物' : 'Please select products', '', 'error');
                    return;
                }
                const missingProds = correctProds.filter(p => !userProds.includes(p));
                const extraProds = userProds.filter(p => !correctProds.includes(p));

                document.querySelectorAll('.prod-btn').forEach(b => {
                    const key = b.dataset.prod;
                    b.classList.remove('correct', 'incorrect');
                    if (correctProds.includes(key)) {
                        if (userProds.includes(key)) {
                            b.classList.add('correct');
                        } else {
                            b.classList.add('incorrect');
                        }
                    } else {
                        if (userProds.includes(key)) {
                            b.classList.add('incorrect');
                        }
                    }
                });

                if (missingProds.length === 0 && extraProds.length === 0) {
                    productsCorrect = true;
                    productCheckDone = true;
                    productFeedback.textContent = t('productsCorrect');
                    productFeedback.className = 'product-feedback success';
                    showBalanceAndObs = true;
                    obsSection.style.display = 'flex';
                    updateObsVisibility(correctProds);
                    document.querySelectorAll(
                        '#obsPptGroup .obs-btn, #obsOtherGroup .obs-btn, #obsDepositGroup .obs-btn').forEach(
                        b => b.disabled = false);
                    if (currentMetal && currentReagent) {
                        renderBalanceEquation(currentMetal, currentReagent);
                    }
                    checkReactionBtn.disabled = true;
                    checkBottomBtn.disabled = false;
                    nextStepBtn.disabled = true;
                    spinBtn.disabled = true;
                    nextQuestionBtn.disabled = false;
                    nextQuestionBtn.style.display = 'inline-block';
                    setFeedback('✏️', currentLang === 'zh' ? '產物正確！請平衡方程式並選擇觀察' :
                        'Products correct! Balance the equation and select observations', '', null);
                } else {
                    productsCorrect = false;
                    productCheckDone = true;
                    let errMsg = '';
                    if (missingProds.length > 0) {
                        const missingLabels = missingProds.map(p => t('prod_' + p)).join('、');
                        errMsg += (currentLang === 'zh' ? '漏選：' : 'Missing: ') + missingLabels;
                    }
                    if (extraProds.length > 0) {
                        const extraLabels = extraProds.map(p => t('prod_' + p)).join('、');
                        if (errMsg) errMsg += '；';
                        errMsg += (currentLang === 'zh' ? '多選：' : 'Extra: ') + extraLabels;
                    }
                    productFeedback.textContent = '❌ ' + errMsg;
                    productFeedback.className = 'product-feedback error';
                    showBalanceAndObs = false;
                    balanceArea.style.display = 'none';
                    obsSection.style.display = 'none';
                    checkReactionBtn.disabled = true;
                    checkBottomBtn.disabled = true;
                    nextStepBtn.disabled = false;
                    spinBtn.disabled = true;
                    nextQuestionBtn.disabled = true;
                    nextQuestionBtn.style.display = 'none';
                    let trapNote = '';
                    if (result.trap) {
                        const hasDeposit = selectedDeposit.has('deposit_brown') || selectedDeposit.has(
                            'deposit_silver');
                        const hasMetal = selectedProducts.has('metal');
                        if (hasDeposit || hasMetal) {
                            trapNote = ' ' + (result.trapNote || t('fbTrap'));
                        }
                    }
                    setFeedback('⚠️', t('productFeedbackError'), errMsg + trapNote, 'error');
                }
            }

            function checkAnswer() {
                if (isAnswered) {
                    setFeedback('✅', t('fbCorrect'), '', 'success');
                    return;
                }
                if (!currentMetal || !currentReagent) {
                    setFeedback('⚠️', currentLang === 'zh' ? '請先抽題' : 'Please spin first', '', 'error');
                    return;
                }
                if (!reactionChecked || selectedReaction !== 'yes') {
                    setFeedback('⚠️', currentLang === 'zh' ? '請先確認反應狀態' : 'Please confirm reaction status first', '',
                        'error');
                    return;
                }

                if (!productsCorrect || !productCheckDone) {
                    setFeedback('⚠️', currentLang === 'zh' ? '請先按「下一步」確認產物' :
                        'Please click "Next Step" to confirm products', '', 'error');
                    return;
                }

                const balanceOk = checkBalance(currentMetal, currentReagent);
                if (!balanceOk && balanceActive) {
                    let msg = t('balWrong');
                    let detail = '';
                    const eq = getBalancedEquation(currentMetal, currentReagent);
                    if (eq) {
                        const correctCoeffs = eq.coeffs.join(', ');
                        detail = currentLang === 'zh' ? `✅ 正確係數：${correctCoeffs}` :
                            `✅ Correct coefficients: ${correctCoeffs}`;
                    }
                    setFeedback('❌', msg, detail, 'error');
                    return;
                }

                const userObs = [];
                const flameVal = obsFlame.value;
                if (flameVal && flameVal !== 'none') userObs.push(flameVal.trim());

                const solidVal = obsSolid.value;
                if (solidVal && solidVal !== 'none') {
                    userObs.push(solidVal.trim());
                    if (solidVal === 'color_temp') {
                        const hot = colorTempHot.value;
                        const cold = colorTempCold.value;
                        if (hot && hot !== 'none' && cold && cold !== 'none') {
                            let tempKey = '';
                            if (currentMetal === 'Zn') {
                                if (hot === 'yellow' && cold === 'white') tempKey = 'color_temp_white_yellow';
                            } else if (currentMetal === 'Pb') {
                                if (hot === 'orange' && cold === 'yellow') tempKey = 'color_temp_yellow_orange';
                            }
                            if (tempKey) userObs.push(tempKey);
                        }
                    }
                }

                const solVal = obsSolution.value;
                if (solVal && solVal !== 'none') userObs.push(solVal.trim());

                selectedDeposit.forEach(o => { if (o) userObs.push(o.trim()); });
                selectedPpt.forEach(o => { if (o) userObs.push(o.trim()); });
                selectedOther.forEach(o => { if (o) userObs.push(o.trim()); });

                const filteredUserObs = userObs.filter(o => o && o.length > 0);
                const correctObs = (currentResult.obs || []).map(o => o.trim()).filter(o => o && o.length > 0);

                const userSet = new Set(filteredUserObs);
                const correctSet = new Set(correctObs);

                const missingObs = correctObs.filter(o => !userSet.has(o));
                const extraObs = filteredUserObs.filter(o => !correctSet.has(o));

                let obsError = false;
                let obsMsg = '';

                if (missingObs.length > 0) {
                    obsError = true;
                    const missingLabels = missingObs.map(o => t(o) || o).join('、');
                    obsMsg += (currentLang === 'zh' ? '漏選：' : 'Missing: ') + missingLabels;
                }
                if (extraObs.length > 0) {
                    obsError = true;
                    const extraLabels = extraObs.map(o => t(o) || o).join('、');
                    if (obsMsg) obsMsg += '；';
                    obsMsg += (currentLang === 'zh' ? '多選：' : 'Extra: ') + extraLabels;
                }

                if (obsError) {
                    let trapHint = '';
                    if (currentResult.trap) {
                        const hasDeposit = selectedDeposit.has('deposit_brown') || selectedDeposit.has(
                            'deposit_silver');
                        const hasMetal = selectedProducts.has('metal');
                        if (hasDeposit || hasMetal) {
                            trapHint = ' ' + (currentResult.trapNote || t('fbTrap'));
                        }
                    }
                    setFeedback('⚠️', currentLang === 'zh' ? '觀察選擇有誤' : 'Observation selection incorrect', obsMsg +
                        trapHint, 'error');
                    return;
                }

                isAnswered = true;
                spinBtn.disabled = false;
                spinBtn.textContent = t('nextBtn');
                totalAttempts++;
                correctAttempts++;
                document.querySelectorAll(
                    '.opt-btn, #productGroup .prod-btn, #obsPptGroup .obs-btn, #obsOtherGroup .obs-btn, #obsDepositGroup .obs-btn, .coeff-box'
                    ).forEach(b => b.disabled = true);
                checkReactionBtn.disabled = true;
                checkBottomBtn.disabled = true;
                nextStepBtn.disabled = true;
                nextQuestionBtn.disabled = false;
                nextQuestionBtn.style.display = 'inline-block';
                let trapMsg = currentResult.trap ? ' ' + t('fbTrap') : '';
                let balMsg = balanceOk || !balanceActive ? ' ' + t('balCheck') : '';
                setFeedback('✅', t('fbCorrect') + balMsg, `${t('fbProducts')} ${currentResult.products}${trapMsg}`,
                    'success');
            }

            function nextQuestion() {
                if (!isAnswered) return;
                isAnswered = false;
                selectedReaction = null;
                selectedPpt = new Set();
                selectedOther = new Set();
                selectedDeposit = new Set();
                selectedProducts = new Set();
                productsCorrect = false;
                showBalanceAndObs = false;
                productCheckDone = false;
                reactionChecked = false;
                currentMetal = null;
                currentReagent = null;
                currentResult = null;
                balanceArea.style.display = 'none';
                productRow.style.display = 'none';
                obsSection.style.display = 'none';
                colorTempSub.style.display = 'none';
                metalDisplay.textContent = '—';
                reagentDisplay.textContent = '—';
                reactionQuestionMark.textContent = '→ ?';
                productFeedback.textContent = '';
                productFeedback.className = 'product-feedback';
                document.querySelectorAll('.prod-btn').forEach(b => b.classList.remove('correct', 'incorrect'));
                document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
                document.querySelectorAll(
                    '#productGroup .prod-btn, #obsPptGroup .obs-btn, #obsOtherGroup .obs-btn, #obsDepositGroup .obs-btn'
                    ).forEach(b => b.classList.remove('selected'));
                document.querySelectorAll(
                    '.opt-btn, #productGroup .prod-btn, #obsPptGroup .obs-btn, #obsOtherGroup .obs-btn, #obsDepositGroup .obs-btn'
                    ).forEach(b => b.disabled = false);
                document.querySelectorAll(
                    '#productGroup .prod-btn, #obsPptGroup .obs-btn, #obsOtherGroup .obs-btn, #obsDepositGroup .obs-btn'
                    ).forEach(b => b.disabled = true);
                nextStepBtn.disabled = true;
                checkReactionBtn.disabled = true;
                checkBottomBtn.disabled = true;
                nextQuestionBtn.disabled = true;
                nextQuestionBtn.style.display = 'none';
                spinBtn.disabled = false;
                spinBtn.textContent = t('spinBtn');
                setFeedback('✏️', t('fbSpin'), '', null);
                spinWheel();
            }

            // ============================================================
            // 語言切換
            // ============================================================
            function setLanguage(lang) {
                currentLang = lang;
                langBtns.forEach(b => b.classList.toggle('active', b.dataset.lang === lang));

                // 更新 URL 參數
                const url = new URL(window.location);
                url.searchParams.set('lang', lang);
                window.history.replaceState({}, '', url);

                updateObsOptions();
                renderReferenceTable();

                const selector = document.getElementById('practiceSelector');
                if (selector) {
                    selector.options[0].text = currentLang === 'zh' ? '🧪 離子與化合物 (Ch.7)' :
                        '🧪 Ionic Compounds (Ch.7)';
                    selector.options[1].text = currentLang === 'zh' ? '⚙️ 金屬反應 (Ch.11)' : '⚙️ Metal Reactions (Ch.11)';
                    selector.options[2].text = currentLang === 'zh' ? '🏠 返回目錄' : '🏠 Home';
                }

                if (balanceArea.style.display !== 'none') {
                    renderBalanceEquation(currentMetal, currentReagent);
                }
                if (productCheckDone) {
                    if (productsCorrect) {
                        productFeedback.textContent = t('productsCorrect');
                        productFeedback.className = 'product-feedback success';
                    }
                }
                spinBtn.textContent = isAnswered ? t('nextBtn') : t('spinBtn');
                checkReactionBtn.textContent = t('checkBtn');
                checkBottomBtn.textContent = t('checkBtn');
                nextStepBtn.textContent = t('nextStepBtn');
                nextQuestionBtn.textContent = t('nextQuestionBtn');
                if (currentMetal && currentReagent) {
                    const reagentLabel = getReagentLabel(currentReagent, currentMetal);
                    reactionQuestionMark.textContent = `→ ?`;
                }
                if (!isAnswered && !isSpinning) {
                    setFeedback('✏️', t('fbSpin'), '', null);
                }
            }

            // ============================================================
            // 初始化
            // ============================================================
            function initApp(lang) {
                const urlLang = getUrlParameter('lang');
                if (urlLang && (urlLang === 'zh' || urlLang === 'en')) { lang = urlLang; }
                currentLang = lang;
                mainCard.style.display = 'flex';
                langBtns.forEach(b => b.classList.toggle('active', b.dataset.lang === lang));

                practiceSelector.addEventListener('change', function() {
                    const value = this.value;
                    const lang = currentLang || 'en';
                    if (value === 'home') {
                        window.location.href = 'index.html?lang=' + lang;
                    } else if (value === 'ions') {
                        window.location.href = 'ions.html?lang=' + lang;
                    } else if (value === 'rxn') {
                        window.location.href = 'rxn.html?lang=' + lang;
                    }
                });

                spinBtn.addEventListener('click', function() {
                    if (isAnswered) { nextQuestion(); } else { spinWheel(); }
                });
                checkReactionBtn.addEventListener('click', handleCheckReaction);
                checkBottomBtn.addEventListener('click', checkAnswer);
                nextStepBtn.addEventListener('click', handleNextStep);
                nextQuestionBtn.addEventListener('click', function() {
                    if (isAnswered) { nextQuestion(); }
                });

                document.querySelectorAll('.opt-btn').forEach(b => {
                    b.addEventListener('click', handleOptClick);
                });

                document.querySelectorAll('#productGroup .prod-btn').forEach(b => {
                    b.addEventListener('click', handleProductClick);
                });

                document.querySelectorAll('#obsDepositGroup .obs-btn').forEach(b => {
                    b.addEventListener('click', function() {
                        if (isAnswered || isSpinning || selectedReaction === 'no' || !reactionChecked) return;
                        const key = this.dataset.obs;
                        if (selectedDeposit.has(key)) {
                            selectedDeposit.delete(key);
                            this.classList.remove('selected');
                        } else {
                            selectedDeposit.add(key);
                            this.classList.add('selected');
                        }
                    });
                });
                document.querySelectorAll('#obsPptGroup .obs-btn').forEach(b => {
                    b.addEventListener('click', function() {
                        if (isAnswered || isSpinning || selectedReaction === 'no' || !reactionChecked) return;
                        const key = this.dataset.obs;
                        if (selectedPpt.has(key)) {
                            selectedPpt.delete(key);
                            this.classList.remove('selected');
                        } else {
                            selectedPpt.add(key);
                            this.classList.add('selected');
                        }
                    });
                });
                document.querySelectorAll('#obsOtherGroup .obs-btn').forEach(b => {
                    b.addEventListener('click', function() {
                        if (isAnswered || isSpinning || selectedReaction === 'no' || !reactionChecked) return;
                        const key = this.dataset.obs;
                        if (selectedOther.has(key)) {
                            selectedOther.delete(key);
                            this.classList.remove('selected');
                        } else {
                            selectedOther.add(key);
                            this.classList.add('selected');
                        }
                    });
                });

                obsSolid.addEventListener('change', function() {
                    if (this.value === 'color_temp') {
                        colorTempSub.style.display = 'inline-flex';
                    } else {
                        colorTempSub.style.display = 'none';
                    }
                });

                balanceCheckbox.addEventListener('change', function() {
                    balanceActive = this.checked;
                    if (!balanceActive) {
                        balanceArea.style.display = 'none';
                    } else if (showBalanceAndObs && currentMetal && currentReagent) {
                        renderBalanceEquation(currentMetal, currentReagent);
                    }
                    setFeedback('✏️', currentLang === 'zh' ? '平衡功能已' + (balanceActive ? '啟用' : '關閉') :
                        'Balance ' + (balanceActive ? 'enabled' : 'disabled'), '', null);
                });

                document.getElementById('btnMetalSeries').addEventListener('click', function() {
                    document.getElementById('metalSeriesModal').classList.add('active');
                    renderReferenceTable();
                });
                document.getElementById('modalClose').addEventListener('click', function() {
                    document.getElementById('metalSeriesModal').classList.remove('active');
                });
                document.getElementById('metalSeriesModal').addEventListener('click', function(e) {
                    if (e.target === this) this.classList.remove('active');
                });

                langBtns.forEach(b => {
                    b.addEventListener('click', () => setLanguage(b.dataset.lang));
                });

                setupCoeffPopup();

                setLanguage(lang);
                setFeedback('✏️', t('fbSpin'), '', null);

                metalDisplay.textContent = '—';
                reagentDisplay.textContent = '—';
                reactionQuestionMark.textContent = '→ ?';
                document.querySelectorAll(
                    '#productGroup .prod-btn, #obsPptGroup .obs-btn, #obsOtherGroup .obs-btn, #obsDepositGroup .obs-btn'
                    ).forEach(b => b.disabled = true);
                spinBtn.textContent = t('spinBtn');
                checkReactionBtn.textContent = t('checkBtn');
                checkBottomBtn.textContent = t('checkBtn');
                nextStepBtn.textContent = t('nextStepBtn');
                nextQuestionBtn.textContent = t('nextQuestionBtn');
                nextQuestionBtn.style.display = 'none';
                balanceActive = true;
                balanceCheckbox.checked = true;
                obsRowFlame.style.display = 'flex';
                obsRowSolid.style.display = 'none';
                obsRowDeposit.style.display = 'none';
                obsRowPpt.style.display = 'none';
                obsRowOther.style.display = 'flex';

                updateObsOptions();
            }

            const initialLang = getUrlParameter('lang') || 'en';
            initApp(initialLang);
            console.log('⚙️ 金屬反應練習已啟動 (最終版：K/Na火焰修正 + Ba移除 + Sol. + 活性序英文 + padding歸零 + 方程式字體放大)');
        })();
    </script>
</body>
</html>
